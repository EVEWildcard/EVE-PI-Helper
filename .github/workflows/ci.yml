name: CI

# Gate before the Vercel auto-deploy on main: typecheck, lint, and test every push
# and pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (web)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Typecheck (node)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
