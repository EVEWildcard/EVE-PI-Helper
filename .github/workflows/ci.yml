name: CI

# Gate before the Vercel auto-deploy on main: typecheck, lint, and test every push
# and pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, which matches the npm that generates our
          # package-lock.json. Node 20/22 ship npm 10, whose `npm ci` rejects
          # the lockfile's esbuild optional-deps as "Missing from lock file".
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (web)
        run: npx tsc --noEmit -p tsconfig.web.json

      - name: Typecheck (node)
        run: npx tsc --noEmit -p tsconfig.node.json

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
